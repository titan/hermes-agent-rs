      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="256" y1="100" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle glow behind the icon -->
  <circle cx="256" cy="260" r="140" fill="url(#glow)"/>

  <!-- Hermes winged helmet — stylized H with wings -->

