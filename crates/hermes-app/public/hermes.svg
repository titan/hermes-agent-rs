  <!-- Crossbar of H -->
  <rect x="170" y="240" width="172" height="40" rx="20" fill="url(#wing)"/>

  <!-- Left wing -->
  <path d="M170 220 C170 220 120 170 90 140 C80 130 75 135 80 148 C95 185 130 215 170 235Z" fill="url(#wing)" opacity="0.9"/>
  <path d="M165 200 C165 200 125 155 100 125 C90 113 83 118 90 132 C105 165 135 192 165 210Z" fill="url(#wing)" opacity="0.7"/>
  <path d="M160 180 C160 180 130 142 110 115 C102 105 95 110 102 122 C115 150 140 175 160 190Z" fill="url(#wing)" opacity="0.5"/>

  <!-- Right wing -->
  <path d="M342 220 C342 220 392 170 422 140 C432 130 437 135 432 148 C417 185 382 215 342 235Z" fill="url(#wing)" opacity="0.9"/>
  <path d="M347 200 C347 200 387 155 412 125 C422 113 429 118 422 132 C407 165 377 192 347 210Z" fill="url(#wing)" opacity="0.7"/>
  <path d="M352 180 C352 180 382 142 402 115 C410 105 417 110 410 122 C397 150 372 175 352 190Z" fill="url(#wing)" opacity="0.5"/>

  <!-- AI dot / eye -->
  <circle cx="256" cy="195" r="10" fill="#0a0a0a"/>
  <circle cx="256" cy="195" r="6" fill="#fb923c"/>
  <circle cx="258" cy="193" r="2" fill="white" opacity="0.8"/>

