name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: hermes-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact_name: hermes-linux-aarch64
          - target: x86_64-pc-windows-gnu
            artifact_name: hermes-windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }} -p hermes-cli
      - name: Package artifact
        run: |
          mkdir -p dist
          if [ -f target/${{ matrix.target }}/release/hermes ]; then
            cp target/${{ matrix.target }}/release/hermes dist/hermes
          else
            cp target/${{ matrix.target }}/release/hermes.exe dist/hermes.exe
            mv dist/hermes.exe dist/hermes
          fi
          tar -C dist -czf ${{ matrix.artifact_name }}.tar.gz hermes
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.tar.gz

  publish-installers:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Homebrew formula
        run: bash scripts/generate-homebrew-formula.sh "${GITHUB_REF_NAME}"
      - name: Upload helper scripts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install.sh
            Formula/hermes.rb
