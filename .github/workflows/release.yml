name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: hermes-linux-x86_64.tar.gz
            binary: hermes
          - target: aarch64-unknown-linux-gnu
            artifact: hermes-linux-aarch64.tar.gz
            binary: hermes
          - target: x86_64-unknown-linux-musl
            artifact: hermes-linux-x86_64-musl.tar.gz
            binary: hermes
          - target: x86_64-pc-windows-gnu
            artifact: hermes-windows-x86_64.zip
            binary: hermes.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }} -p hermes-cli
      - name: Package artifact (tar.gz)
        if: "!contains(matrix.artifact, '.zip')"
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          tar -C dist -czf ${{ matrix.artifact }} ${{ matrix.binary }}
      - name: Package artifact (zip)
        if: contains(matrix.artifact, '.zip')
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist && zip ../${{ matrix.artifact }} ${{ matrix.binary }}
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  macos-build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: hermes-macos-aarch64.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: hermes-macos-x86_64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p hermes-cli
      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hermes dist/
          tar -C dist -czf ${{ matrix.artifact }} hermes
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  publish-installers:
    runs-on: ubuntu-latest
    needs: [cross-build, macos-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Homebrew formula
        run: bash scripts/generate-homebrew-formula.sh "${GITHUB_REF_NAME}"
      - name: Upload helper scripts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install.sh
            Formula/hermes.rb
